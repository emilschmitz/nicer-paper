<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citation Finder Stats</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #e5e7eb;
      --text-muted: #9ca3af;
      --accent-color: #3b82f6;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --glass-blur: blur(12px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      width: 300px;
      padding: 16px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 5px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Status Banner */
    .status-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Info card */
    .info-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .info-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 2px;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .footer-msg {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo"></div>
    <div class="title">Citation Tooltips Finder</div>
  </div>

  <div class="status-container">
    <span class="status-label">Engine Status</span>
    <span class="status-badge status-inactive" id="status-badge">Inactive</span>
  </div>

  <div class="info-card" id="doc-card" style="display: none;">
    <div class="info-title">Active PDF Document</div>
    <div class="info-value" id="doc-name">-</div>
  </div>

  <div class="stats-grid" id="stats-area" style="display: none;">
    <div class="stat-box">
      <div class="stat-num" id="stat-citations">0</div>
      <div class="stat-lbl">References</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-links">0</div>
      <div class="stat-lbl">Link Overlays</div>
    </div>
    <div class="stat-box" style="grid-column: span 2;">
      <div class="stat-num" style="font-size: 16px; color: var(--text-color);" id="stat-ratio">0%</div>
      <div class="stat-lbl">Citation Match Rate</div>
    </div>
  </div>

  <div class="footer-msg" id="footer-message">
    Open any PDF file link or drag-and-drop a PDF to activate finder.
  </div>

  <script src="popup.js"></script>
</body>
</html>
