<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NicerPaper</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #e5e7eb;
      --text-muted: #9ca3af;
      --accent-color: #3b82f6;
      --accent-success: #10b981;
      --accent-danger: #ef4444;
      --glass-blur: blur(12px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      width: 300px;
      padding: 16px;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .logo {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 5px;
    }

    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Status Banner */
    .status-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
    }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    .status-active {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .status-inactive {
      background: rgba(239, 68, 68, 0.15);
      color: var(--accent-danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Info card */
    .info-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .info-title {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }

    .info-value {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-num {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-color);
      margin-bottom: 2px;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .footer-msg {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
      line-height: 1.4;
    }

    /* Settings section */
    .settings-section {
      border-top: 1px solid var(--border-color);
      margin-top: 16px;
      padding-top: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .patterns-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      max-height: 60px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Progress Bar Styles */
    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
      margin-bottom: 4px;
      border: 1px solid var(--border-color);
    }

    .progress-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      border-radius: 4px;
      transition: width 0.2s ease;
    }

    .progress-text {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
    }

    .pattern-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 10px;
      font-family: monospace;
    }

    .pattern-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
      color: var(--text-color);
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--accent-danger);
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .btn-delete:hover {
      opacity: 0.8;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .input-text {
      flex: 1;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text-color);
      font-size: 11px;
      font-family: monospace;
    }

    .input-text:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    .input-error {
      border-color: var(--accent-danger) !important;
    }

    .btn-small {
      background: var(--accent-color);
      border: none;
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-small:hover {
      background: #2563eb;
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-color);
    }

    /* Checkbox list styles */
    .pref-checkbox-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 11px;
    }
    .pref-checkbox-list label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: var(--text-muted);
      transition: color 0.15s;
    }
    .pref-checkbox-list label:hover {
      color: var(--text-color);
    }
    .pref-checkbox-list input[type="checkbox"] {
      cursor: pointer;
      accent-color: var(--accent-color);
      width: 14px;
      height: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo"></div>
    <div class="title">NicerPaper</div>
  </div>

  <div class="status-container">
    <span class="status-label">Engine Status</span>
    <span class="status-badge" id="status-badge" style="background: rgba(255, 255, 255, 0.05); color: var(--text-muted); border: 1px solid var(--border-color);">Pending...</span>
  </div>

  <div class="info-card" id="doc-card" style="display: none;">
    <div class="info-title">Active PDF Document</div>
    <div class="info-value" id="doc-name">-</div>
  </div>

  <!-- Parsing Progress Section -->
  <div class="info-card" id="progress-card" style="display: none;">
    <div class="info-title">Parsing PDF...</div>
    <div class="progress-bar-container">
      <div class="progress-bar-fill" id="progress-bar-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">0%</div>
  </div>

  <div class="stats-grid" id="stats-area" style="display: none;">
    <div class="stat-box">
      <div class="stat-num" id="stat-citations">0</div>
      <div class="stat-lbl">References</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="stat-links">0</div>
      <div class="stat-lbl">Link Overlays</div>
    </div>
    <div class="stat-box" style="grid-column: span 2;">
      <div class="stat-num" style="font-size: 16px; color: var(--text-color);" id="stat-ratio">0%</div>
      <div class="stat-lbl">Citation Match Rate</div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 14px; margin-bottom: 8px;">
    <span id="toggle-settings" style="font-size: 11px; color: var(--accent-color); cursor: pointer; user-select: none; font-weight: 500; text-decoration: underline;">
      ⚙️ Show Settings
    </span>
  </div>

  <!-- Intercept Patterns Settings -->
  <div class="settings-section" id="settings-panel" style="display: none;">
    <div class="section-title">
      <span>Allowed Patterns (Whitelist)</span>
    </div>
    <div class="patterns-list" id="whitelist-list">
      <!-- Managed dynamically via popup.js -->
    </div>

    <div class="section-title" style="margin-top: 10px;">
      <span>Blocked Patterns (Blacklist)</span>
    </div>
    <div class="patterns-list" id="blacklist-list">
      <!-- Managed dynamically via popup.js -->
    </div>

    <div class="input-group" style="margin-top: 8px;">
      <input type="text" class="input-text" id="pattern-input" placeholder="e.g. arxiv\.org/pdf/" />
      <select class="input-text" id="pattern-type" style="flex: 0 0 80px; font-family: sans-serif; cursor: pointer;">
        <option value="allow">Allow</option>
        <option value="block">Block</option>
      </select>
      <button class="btn-small" id="btn-add-pattern">Add</button>
    </div>

    <!-- Tooltip Preferences -->
    <div class="section-title" style="margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 12px;">
      <span>Tooltip Components</span>
    </div>
    <div class="pref-checkbox-list">
      <label>
        <input type="checkbox" id="pref-authors" checked /> Show Authors
      </label>
      <label>
        <input type="checkbox" id="pref-year" checked /> Show Year
      </label>
      <label>
        <input type="checkbox" id="pref-title" checked /> Show Title
      </label>
      <label>
        <input type="checkbox" id="pref-venue" checked /> Show Publication Venue
      </label>
      <label>
        <input type="checkbox" id="pref-abstract" checked /> Show Abstract Preview
      </label>
      <label>
        <input type="checkbox" id="pref-open" checked /> Show "Open Paper" Button
      </label>
      <label>
        <input type="checkbox" id="pref-copy" checked /> Show "Copy Link" Button
      </label>
    </div>

    <button class="btn-reset" id="btn-reset-patterns">Reset Defaults</button>
  </div>

  <div class="footer-msg" id="footer-message">
    Open any PDF file link or drag-and-drop a PDF to activate finder.
  </div>

  <script src="popup.js"></script>
</body>
</html>
