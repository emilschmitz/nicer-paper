<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Citation Tooltips PDF Viewer</title>
  <link rel="stylesheet" href="tooltip.css">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #e5e7eb;
      --text-muted: #9ca3af;
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --glass-blur: blur(12px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Glassmorphic Navbar */
    .navbar {
      height: 64px;
      background: var(--panel-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 6px;
    }

    .brand-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .doc-title {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 1px solid var(--border-color);
      padding-left: 16px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .btn-accent {
      background: var(--accent-color);
      border-color: transparent;
    }

    .btn-accent:hover {
      background: var(--accent-hover);
    }

    .zoom-text {
      font-size: 13px;
      color: var(--text-muted);
      min-width: 48px;
      text-align: center;
    }

    /* Main Content Layout */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Sidebar containing extracted citations list */
    .sidebar {
      width: 320px;
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: var(--glass-blur);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width 0.3s ease;
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-title {
      font-size: 15px;
      font-weight: 600;
    }

    .sidebar-count {
      font-size: 12px;
      background: rgba(255, 255, 255, 0.1);
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--text-muted);
    }

    .citations-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .citation-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.4;
      transition: all 0.2s;
    }

    .citation-card:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .citation-card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 8px;
    }

    .card-url {
      color: var(--accent-color);
      text-decoration: none;
      word-break: break-all;
      display: block;
      margin-top: 4px;
    }

    .card-url:hover {
      text-decoration: underline;
    }

    /* PDF Workspace Area */
    .workspace {
      flex: 1;
      overflow: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      scroll-behavior: smooth;
    }

    /* Page Container */
    .page-container {
      position: relative;
      background-color: white;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .page-container canvas {
      display: block;
    }

    /* Transparent Overlay Link Layer */
    .link-overlay {
      position: absolute;
      background-color: rgba(59, 130, 246, 0.0); /* completely transparent */
      border: 1px dashed rgba(59, 130, 246, 0.0); /* completely transparent */
      cursor: pointer;
      z-index: 10;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .link-overlay:hover {
      background-color: rgba(59, 130, 246, 0.15);
      border-color: rgba(59, 130, 246, 0.4);
    }

    /* Loader */
    .loader-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top-color: var(--accent-color);
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader-text {
      font-size: 14px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="navbar">
    <div class="brand">
      <div class="brand-logo"></div>
      <div class="brand-title">Citation Finder</div>
      <div class="doc-title" id="document-title">Loading PDF...</div>
    </div>
    
    <div class="controls">
      <button class="btn" id="btn-sidebar-toggle">Toggle Sidebar</button>
      <button class="btn" id="btn-zoom-out">Zoom Out</button>
      <span class="zoom-text" id="zoom-value">150%</span>
      <button class="btn" id="btn-zoom-in">Zoom In</button>
      <button class="btn" id="btn-zoom-fit">Fit Page</button>
    </div>
  </div>

  <!-- Main Work Area -->
  <div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Extracted References</span>
        <span class="sidebar-count" id="cit-count">0</span>
      </div>
      <div class="citations-list" id="citations-list">
        <!-- Citation Cards will be populated here -->
      </div>
    </div>

    <!-- Scrollable Workspace for PDF -->
    <div class="workspace" id="workspace">
      <!-- Pages will be rendered here dynamically -->
    </div>
  </div>

  <!-- Full Screen Loader Overlay -->
  <div class="loader-overlay" id="loader">
    <div class="spinner"></div>
    <div class="loader-text" id="loader-status">Initializing PDF.js engine...</div>
  </div>

  <!-- ES module loading viewer.js -->
  <script type="module" src="viewer.js"></script>
</body>
</html>
